<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>预测验证 - 电商精准营销决策系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        .threshold-display {
            font-size: 2.25rem;
            font-weight: 700;
            color: #1a73e8;
            letter-spacing: 0.02em;
        }
        .form-range::-webkit-slider-thumb {
            background: #1a73e8;
        }
        .form-range::-moz-range-thumb {
            background: #1a73e8;
        }
        #thresholdCurveChart {
            width: 100%;
            height: 420px;
        }
        .explain-card {
            border-left: 4px solid #1a73e8;
            background: #f8faff;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg app-navbar sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-graph-up-arrow me-1"></i>电商精准营销决策系统</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                <li class="nav-item"><a class="nav-link" href="/stats">数据统计</a></li>
                <li class="nav-item"><a class="nav-link" href="/flow">决策流程</a></li>
                <li class="nav-item"><a class="nav-link active" href="/validate">预测验证</a></li>
                <li class="nav-item"><a class="nav-link" href="/vip">会员中心</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="/logout">退出</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-4">

    <div th:if="${vipRequired != null}" class="alert alert-warning mb-4">
        <i class="bi bi-lock me-1"></i> 预测验证功能需要<strong th:text="${vipRequiredName}">年度会员</strong>才能使用。
        <a href="/vip" class="btn btn-sm btn-warning ms-2">立即开通</a>
    </div>

    <div th:classappend="${vipRequired != null} ? 'pe-none' : ''" th:styleappend="${vipRequired != null} ? 'opacity:0.4;pointer-events:none' : ''">

    <div id="pageAlert" class="alert alert-warning d-none mb-3" role="alert"></div>

    <!-- 算法选择 -->
    <div class="app-card p-4 mb-4 animate-in">
        <div class="app-section-title"><i class="bi bi-cpu"></i> 算法选择</div>
        <div class="d-flex flex-wrap gap-4">
            <div class="form-check">
                <input class="form-check-input" type="radio" name="algorithm" id="algoRf" value="RandomForest" checked>
                <label class="form-check-label" for="algoRf">随机森林</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="algorithm" id="algoLr" value="Logistic">
                <label class="form-check-label" for="algoLr">逻辑回归</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="algorithm" id="algoNb" value="NaiveBayes">
                <label class="form-check-label" for="algoNb">朴素贝叶斯</label>
            </div>
        </div>
    </div>

    <!-- 阈值与单次验证 -->
    <div class="app-card p-4 mb-4 animate-in">
        <div class="app-section-title"><i class="bi bi-sliders"></i> 决策阈值与单次验证</div>
        <div class="row align-items-center g-4">
            <div class="col-lg-6">
                <label for="thresholdSlider" class="form-label text-muted mb-2">当前阈值</label>
                <div class="threshold-display mb-2"><span id="thresholdValueDisplay">0.5</span></div>
                <input type="range" class="form-range" id="thresholdSlider" min="0.1" max="0.9" step="0.1" value="0.5">
                <div class="d-flex justify-content-between small text-muted">
                    <span>0.1</span>
                    <span>0.9</span>
                </div>
            </div>
            <div class="col-lg-6 text-lg-end">
                <button type="button" class="btn btn-primary btn-lg px-5" id="btnValidate">
                    <i class="bi bi-check2-circle me-1"></i> 验证
                </button>
                <p class="small text-muted mt-2 mb-0">根据所选算法与阈值调用服务端验证接口</p>
            </div>
        </div>

        <hr class="my-4">

        <div class="row g-3 animate-in">
            <div class="col-6 col-md">
                <div class="app-card app-metric h-100 animate-in">
                    <div class="metric-value" id="mAccuracy">—</div>
                    <div class="metric-label">准确率</div>
                </div>
            </div>
            <div class="col-6 col-md">
                <div class="app-card app-metric h-100 animate-in">
                    <div class="metric-value" id="mPrecision">—</div>
                    <div class="metric-label">精确率</div>
                </div>
            </div>
            <div class="col-6 col-md">
                <div class="app-card app-metric h-100 animate-in">
                    <div class="metric-value" id="mRecall">—</div>
                    <div class="metric-label">召回率</div>
                </div>
            </div>
            <div class="col-6 col-md">
                <div class="app-card app-metric h-100 animate-in">
                    <div class="metric-value" id="mF1">—</div>
                    <div class="metric-label">F1 值</div>
                </div>
            </div>
            <div class="col-6 col-md">
                <div class="app-card app-metric h-100 animate-in">
                    <div class="metric-value" id="mMae">—</div>
                    <div class="metric-label">平均绝对误差</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 阈值曲线 -->
    <div class="app-card p-4 mb-4 animate-in">
        <div class="app-section-title"><i class="bi bi-graph-up"></i> 全阈值性能曲线</div>
        <div id="thresholdCurveChart"></div>
    </div>

    <!-- 说明 -->
    <div class="app-card p-4 explain-card animate-in">
        <div class="app-section-title mb-3"><i class="bi bi-info-circle"></i> 阈值说明</div>
        <ul class="mb-0 ps-3 text-secondary">
            <li class="mb-2">阈值越低，更多用户被判定为「愿意购买」（召回率升高，精确率降低）。</li>
            <li class="mb-2">阈值越高，判定标准更严格（精确率升高，召回率降低）。</li>
            <li>建议根据业务需求选择合适的阈值平衡点。</li>
        </ul>
    </div>
    </div><!-- /vip wrapper -->
</div>

<footer class="app-footer">
    电商精准营销决策系统
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
(function () {
    const slider = document.getElementById('thresholdSlider');
    const thresholdDisplay = document.getElementById('thresholdValueDisplay');
    const btnValidate = document.getElementById('btnValidate');
    const pageAlert = document.getElementById('pageAlert');
    const chartEl = document.getElementById('thresholdCurveChart');

    function selectedAlgorithm() {
        const r = document.querySelector('input[name="algorithm"]:checked');
        return r ? r.value : 'RandomForest';
    }

    function showAlert(msg) {
        pageAlert.textContent = msg;
        pageAlert.classList.remove('d-none');
    }
    function hideAlert() {
        pageAlert.classList.add('d-none');
    }

    slider.addEventListener('input', function () {
        const v = parseFloat(this.value);
        thresholdDisplay.textContent = Number.isInteger(v) ? v.toFixed(1) : v.toFixed(1);
    });

    function formatPct(v) {
        if (v === undefined || v === null || Number.isNaN(Number(v))) return '—';
        return Number(v).toFixed(2) + '%';
    }
    function formatF1(v) {
        if (v === undefined || v === null || Number.isNaN(Number(v))) return '—';
        return Number(v).toFixed(2) + '%';
    }
    function formatMae(v) {
        if (v === undefined || v === null || Number.isNaN(Number(v))) return '—';
        return Number(v).toFixed(4);
    }

    function setMetricCards(data) {
        if (!data || Object.keys(data).length === 0) {
            document.getElementById('mAccuracy').textContent = '—';
            document.getElementById('mPrecision').textContent = '—';
            document.getElementById('mRecall').textContent = '—';
            document.getElementById('mF1').textContent = '—';
            document.getElementById('mMae').textContent = '—';
            return;
        }
        document.getElementById('mAccuracy').textContent = formatPct(data.accuracy);
        document.getElementById('mPrecision').textContent = formatPct(data.precision);
        document.getElementById('mRecall').textContent = formatPct(data.recall);
        document.getElementById('mF1').textContent = formatF1(data.f1);
        document.getElementById('mMae').textContent = formatMae(data.mae);
    }

    let chartInstance = null;

    function buildChartOption(payload) {
        const thresholds = payload.thresholds || [];
        const toNumArr = (arr) => (arr || []).map(x => (x === null || x === undefined) ? null : Number(x));
        const accuracy = toNumArr(payload.accuracy);
        const precision = toNumArr(payload.precision);
        const recall = toNumArr(payload.recall);
        const f1 = toNumArr(payload.f1);
        const mae = toNumArr(payload.mae).map(v => (v === null || Number.isNaN(v)) ? null : v * 100);

        return {
            title: {
                text: '不同阈值下的模型性能指标',
                left: 'center',
                textStyle: { fontSize: 16, color: '#333', fontWeight: 600 }
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross' },
                formatter: function (params) {
                    if (!params || !params.length) return '';
                    let html = params[0].axisValue + '<br/>';
                    params.forEach(function (p) {
                        let val = p.value;
                        if (p.seriesName === '平均绝对误差') {
                            val = (p.value != null ? (Number(p.value) / 100).toFixed(4) : '—');
                            html += p.marker + p.seriesName + '：' + val + '<br/>';
                        } else {
                            val = p.value != null ? Number(p.value).toFixed(2) + '%' : '—';
                            html += p.marker + p.seriesName + '：' + val + '<br/>';
                        }
                    });
                    return html;
                }
            },
            legend: {
                data: ['准确率', '精确率', '召回率', 'F1 值', '平均绝对误差'],
                bottom: 0
            },
            grid: { left: '3%', right: '4%', bottom: '14%', top: '14%', containLabel: true },
            xAxis: {
                type: 'category',
                name: '决策阈值(0.1-0.9)',
                nameLocation: 'middle',
                nameGap: 28,
                data: thresholds.map(t => String(t)),
                boundaryGap: false
            },
            yAxis: {
                type: 'value',
                name: '指标值(%)',
                min: 0,
                max: 100,
                axisLabel: { formatter: '{value}%' }
            },
            series: [
                { name: '准确率', type: 'line', smooth: true, symbol: 'circle', data: accuracy },
                { name: '精确率', type: 'line', smooth: true, symbol: 'circle', data: precision },
                { name: '召回率', type: 'line', smooth: true, symbol: 'circle', data: recall },
                { name: 'F1 值', type: 'line', smooth: true, symbol: 'circle', data: f1 },
                { name: '平均绝对误差', type: 'line', smooth: true, symbol: 'circle', data: mae }
            ]
        };
    }

    function initOrUpdateChart(payload) {
        if (!chartInstance) {
            chartInstance = echarts.init(chartEl);
            window.addEventListener('resize', function () {
                if (chartInstance) chartInstance.resize();
            });
        }
        chartInstance.setOption(buildChartOption(payload), true);
    }

    async function fetchThresholdCurve() {
        hideAlert();
        const algo = selectedAlgorithm();
        const url = '/api/validate/threshold-curve?algorithm=' + encodeURIComponent(algo);
        const res = await fetch(url, { method: 'GET', credentials: 'same-origin' });
        if (!res.ok) {
            showAlert('加载阈值曲线失败，请稍后重试。');
            return;
        }
        const data = await res.json();
        if (data.error) {
            showAlert(data.error);
            chartInstance && chartInstance.clear();
            return;
        }
        initOrUpdateChart(data);
    }

    async function runSingleValidate() {
        hideAlert();
        const t = parseFloat(slider.value);
        const algo = selectedAlgorithm();
        const url = '/api/validate/single?threshold=' + encodeURIComponent(t) + '&algorithm=' + encodeURIComponent(algo);
        btnValidate.disabled = true;
        try {
            const res = await fetch(url, { method: 'POST', credentials: 'same-origin' });
            if (!res.ok) {
                showAlert('验证请求失败，请稍后重试。');
                return;
            }
            const data = await res.json();
            if (!data || Object.keys(data).length === 0) {
                showAlert('暂无特征数据，请先上传并处理数据后再验证。');
                setMetricCards({});
                return;
            }
            setMetricCards(data);
        } finally {
            btnValidate.disabled = false;
        }
    }

    document.querySelectorAll('input[name="algorithm"]').forEach(function (el) {
        el.addEventListener('change', function () {
            fetchThresholdCurve();
        });
    });

    btnValidate.addEventListener('click', runSingleValidate);

    fetchThresholdCurve();
})();
</script>
</body>
</html>
