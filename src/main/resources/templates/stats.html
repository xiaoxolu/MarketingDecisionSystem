<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数据统计 - 电商精准营销决策系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg app-navbar sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-graph-up-arrow me-1"></i>电商精准营销决策系统</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                <li class="nav-item"><a class="nav-link active" href="/stats">数据统计</a></li>
                <li class="nav-item"><a class="nav-link" href="/flow">决策流程</a></li>
                <li class="nav-item"><a class="nav-link" href="/validate">预测验证</a></li>
                <li class="nav-item"><a class="nav-link" href="/vip">会员中心</a></li>
                <li class="nav-item"><a class="nav-link text-danger" href="/logout">退出</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-4">

    <div class="alert alert-info mb-3">
        <i class="bi bi-info-circle me-1"></i>
        数据存储在数据库中，关闭浏览器不会丢失。如需清空数据请点击：
        <form method="post" action="/clear-data" class="d-inline">
            <button class="btn btn-sm btn-outline-danger ms-2" type="submit" onclick="return confirm('确定清空所有数据？清空后统计页面将无数据显示。')"><i class="bi bi-trash3 me-1"></i>清空全部数据</button>
        </form>
    </div>

    <div id="globalAlert" class="alert alert-danger d-none" role="alert"></div>

    <div class="row g-3 mb-4 animate-in" id="overviewRow">
        <div class="col-6 col-md-3">
            <div class="app-card app-metric h-100 animate-in">
                <div class="metric-value" id="ovTotalRecords">—</div>
                <div class="metric-label">总数据量</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="app-card app-metric h-100 animate-in">
                <div class="metric-value" id="ovTotalUsers">—</div>
                <div class="metric-label">用户数</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="app-card app-metric h-100 animate-in">
                <div class="metric-value" id="ovTotalProducts">—</div>
                <div class="metric-label">商品数</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="app-card app-metric h-100 animate-in">
                <div class="metric-value small" id="ovTimeRange">—</div>
                <div class="metric-label">数据时间范围</div>
            </div>
        </div>
    </div>

    <div class="row g-4 mb-4 animate-in">
        <div class="col-lg-6">
            <div class="app-card p-4 h-100 animate-in">
                <div class="app-section-title"><i class="bi bi-pie-chart"></i> 行为类型分布</div>
                <div id="chartBehaviorPie" style="height:400px"></div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="app-card p-4 h-100 animate-in">
                <div class="app-section-title"><i class="bi bi-funnel"></i> 转化漏斗（浏览→加购→下单→评价）</div>
                <div id="chartFunnel" style="height:400px"></div>
            </div>
        </div>
    </div>

    <div class="app-card p-4 mb-4 animate-in">
        <div class="app-section-title"><i class="bi bi-graph-up"></i> 月度行为趋势</div>
        <div id="chartMonthlyLine" style="height:400px"></div>
    </div>

    <div class="app-card p-4 mb-4 animate-in">
        <div class="app-section-title"><i class="bi bi-people"></i> 活跃用户 Top 10</div>
        <div id="chartTopUsersBar" style="height:400px"></div>
    </div>

</div>

<footer class="app-footer">
    电商精准营销决策系统 — 数据统计
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
    function showGlobalError(msg) {
        const el = document.getElementById('globalAlert');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    function formatTimeRange(minTime, maxTime) {
        if (minTime == null && maxTime == null) return '暂无';
        const a = minTime != null ? String(minTime) : '—';
        const b = maxTime != null ? String(maxTime) : '—';
        return a + ' ~ ' + b;
    }

    window.addEventListener('DOMContentLoaded', function () {
        let chartPie, chartFunnel, chartLine, chartBar;

        function bindResize() {
            window.addEventListener('resize', function () {
                chartPie && chartPie.resize();
                chartFunnel && chartFunnel.resize();
                chartLine && chartLine.resize();
                chartBar && chartBar.resize();
            });
        }

        var noCache = { cache: 'no-store' };

        fetch('/api/stats/overview', noCache)
            .then(function (r) {
                if (!r.ok) throw new Error('概览数据加载失败（' + r.status + '）');
                return r.json();
            })
            .then(function (data) {
                document.getElementById('ovTotalRecords').textContent =
                    data.totalRecords != null ? data.totalRecords : '—';
                document.getElementById('ovTotalUsers').textContent =
                    data.totalUsers != null ? data.totalUsers : '—';
                document.getElementById('ovTotalProducts').textContent =
                    data.totalProducts != null ? data.totalProducts : '—';
                document.getElementById('ovTimeRange').textContent =
                    formatTimeRange(data.minTime, data.maxTime);
            })
            .catch(function (e) {
                showGlobalError(e.message || '概览接口请求异常');
            });

        fetch('/api/stats/behavior-type', noCache)
            .then(function (r) {
                if (!r.ok) throw new Error('行为类型分布加载失败（' + r.status + '）');
                return r.json();
            })
            .then(function (list) {
                chartPie = echarts.init(document.getElementById('chartBehaviorPie'));
                chartPie.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
                    legend: { bottom: 0, type: 'scroll' },
                    series: [{
                        name: '行为类型',
                        type: 'pie',
                        radius: ['36%', '68%'],
                        avoidLabelOverlap: true,
                        itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                        label: { formatter: '{b}\n{d}%' },
                        data: Array.isArray(list) ? list : []
                    }]
                });
            })
            .catch(function (e) {
                showGlobalError(e.message || '行为类型接口请求异常');
            });

        fetch('/api/stats/funnel', noCache)
            .then(function (r) {
                if (!r.ok) throw new Error('转化漏斗加载失败（' + r.status + '）');
                return r.json();
            })
            .then(function (obj) {
                var order = ['浏览', '加购', '下单', '评价'];
                var funnelData = order.map(function (k) {
                    return { name: k, value: obj && obj[k] != null ? Number(obj[k]) : 0 };
                });
                chartFunnel = echarts.init(document.getElementById('chartFunnel'));
                chartFunnel.setOption({
                    tooltip: { trigger: 'item', formatter: '{b}: {c}' },
                    series: [{
                        name: '转化漏斗',
                        type: 'funnel',
                        left: '8%',
                        top: 24,
                        bottom: 24,
                        width: '84%',
                        min: 0,
                        minSize: '0%',
                        maxSize: '100%',
                        sort: 'none',
                        gap: 6,
                        label: { show: true, position: 'inside' },
                        labelLine: { length: 12, lineStyle: { width: 1 } },
                        itemStyle: { borderColor: '#fff', borderWidth: 1 },
                        emphasis: { label: { fontSize: 14 } },
                        data: funnelData
                    }]
                });
            })
            .catch(function (e) {
                showGlobalError(e.message || '漏斗接口请求异常');
            });

        fetch('/api/stats/monthly-trend', noCache)
            .then(function (r) {
                if (!r.ok) throw new Error('月度趋势加载失败（' + r.status + '）');
                return r.json();
            })
            .then(function (data) {
                var months = (data && data.months) ? data.months : [];
                var counts = (data && data.counts) ? data.counts : [];
                chartLine = echarts.init(document.getElementById('chartMonthlyLine'));
                chartLine.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'category',
                        boundaryGap: false,
                        data: months,
                        axisLabel: { rotate: months.length > 8 ? 30 : 0 }
                    },
                    yAxis: { type: 'value', name: '行为次数' },
                    series: [{
                        name: '月度数量',
                        type: 'line',
                        smooth: true,
                        symbolSize: 8,
                        areaStyle: { opacity: 0.12 },
                        lineStyle: { width: 3 },
                        data: counts
                    }]
                });
            })
            .catch(function (e) {
                showGlobalError(e.message || '月度趋势接口请求异常');
            });

        fetch('/api/stats/top-users', noCache)
            .then(function (r) {
                if (!r.ok) throw new Error('活跃用户排行加载失败（' + r.status + '）');
                return r.json();
            })
            .then(function (list) {
                var rows = Array.isArray(list) ? list : [];
                var ids = rows.map(function (x) { return '用户 ' + (x.userId != null ? x.userId : '—'); });
                var vals = rows.map(function (x) { return x.count != null ? Number(x.count) : 0; });
                chartBar = echarts.init(document.getElementById('chartTopUsersBar'));
                chartBar.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '6%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'value', name: '行为次数' },
                    yAxis: {
                        type: 'category',
                        data: ids,
                        inverse: true,
                        axisLabel: { width: 120, overflow: 'truncate' }
                    },
                    series: [{
                        name: '行为次数',
                        type: 'bar',
                        data: vals,
                        itemStyle: { borderRadius: [0, 6, 6, 0] }
                    }]
                });
            })
            .catch(function (e) {
                showGlobalError(e.message || '活跃用户接口请求异常');
            });

        bindResize();
    });
</script>
</body>
</html>
