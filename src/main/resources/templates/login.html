<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>基于用户购买意愿的电商精准营销决策系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; }
        .auth-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { width: 100%; max-width: 460px; border-radius: 20px !important; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: #fff; padding: 2rem 2rem 1.5rem; text-align: center; }
        .auth-header h1 { font-size: 1.1rem; font-weight: 700; margin: 0; line-height: 1.5; }
        .auth-header .auth-icon { font-size: 2.5rem; margin-bottom: .8rem; opacity: .9; display: block; }
        .auth-body { padding: 1.8rem 2rem 2rem; }
        .nav-tabs { border-bottom: 2px solid #e2e8f0; }
        .nav-tabs .nav-link { color: var(--text-secondary); font-weight: 600; border: none; padding: .7rem 1.2rem; border-bottom: 3px solid transparent; margin-bottom: -2px; }
        .nav-tabs .nav-link.active { color: var(--primary); border-bottom-color: var(--primary); background: none; }
        .input-group-text { background: var(--primary-bg); border-color: #e2e8f0; color: var(--primary); border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="app-card auth-card animate-in" style="box-shadow:var(--shadow-lg)">
        <div class="auth-header">
            <i class="bi bi-graph-up-arrow auth-icon"></i>
            <h1>基于用户购买意愿的<br>电商精准营销决策系统</h1>
        </div>
        <div class="auth-body">
            <div th:if="${error}" class="alert alert-danger py-2 mb-3" th:text="${error}"></div>

            <ul class="nav nav-tabs nav-justified mb-4" id="authTabs">
                <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login-pane">登录</button></li>
                <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#register-pane">注册</button></li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="login-pane">
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">用户名</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" name="username" placeholder="请输入用户名" required></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">密码</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" name="password" placeholder="请输入密码" required></div>
                        </div>
                        <button type="submit" class="btn btn-app-primary w-100 py-2">登录</button>
                    </form>
                </div>
                <div class="tab-pane fade" id="register-pane">
                    <form th:action="@{/register}" method="post" id="registerForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">用户名</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-person-plus"></i></span>
                            <input type="text" class="form-control" id="regUsername" name="username" placeholder="设置用户名" required></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">密码</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control" id="regPassword" name="password" placeholder="至少8位，不能全数字" required></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">确认密码</label>
                            <div class="input-group"><span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                            <input type="password" class="form-control" id="regConfirmPassword" placeholder="再次输入密码" required></div>
                        </div>
                        <button type="submit" class="btn btn-app-primary w-100 py-2">注册</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer class="app-footer">&copy; 2025 电商精准营销决策系统</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
    var form = document.getElementById('registerForm');
    if (!form) return;
    form.addEventListener('submit', function (e) {
        var p = document.getElementById('regPassword').value;
        var c = document.getElementById('regConfirmPassword').value;
        if (p !== c) { e.preventDefault(); alert('两次输入的密码不一致，请重新确认。'); return; }
        if (p.length < 8) { e.preventDefault(); alert('密码长度不能少于8位。'); return; }
        if (/^\d+$/.test(p)) { e.preventDefault(); alert('密码不能全是数字，请包含字母或特殊字符。'); return; }
    });
})();
</script>
</body>
</html>
